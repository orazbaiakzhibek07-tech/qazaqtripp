<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тіркелу — QazaqTrip</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">Qazaq<span>Trip</span></a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Тіркелу</h1>
      <p class="auth-sub">Тегін аккаунт ашып, саяхатты жоспарлай бастаңыз.</p>

      <button class="github-btn" onclick="registerWithGithub()">
        <svg viewBox="0 0 24 24">
          <path fill="#fff" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub арқылы тіркелу
      </button>

      <div class="divider">немесе email арқылы</div>

      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Аты-жөні</label>
          <input class="form-input" type="text" id="name" placeholder="Нұрлан Сейітов" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="email" placeholder="siz@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Құпиясөз</label>
          <input class="form-input" type="password" id="password" placeholder="Кем дегенде 8 символ" required minlength="8" />
        </div>
        <button type="submit" class="btn-primary btn-full" style="margin-top:0.5rem">Тегін тіркелу →</button>
      </form>

      <p class="form-footer">
        Аккаунт бар ма? <a href="login.html">Кіру</a>
      </p>
    </div>
  </div>

  <script src="src/styles/main.js"></script>
  <script>
    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      fetch('http://localhost:5000/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.token) {
          localStorage.setItem('qt_token', data.token);
          localStorage.setItem('qt_user', JSON.stringify(data.user));
          window.location.href = 'plan.html';
        } else {
          showToast(data.message || 'Қате орын алды');
        }
      })
      .catch(() => showToast('Сервер қатесі'));
    }

    function registerWithGithub() {
      window.location.href = 'http://localhost:5000/api/auth/github';
    }
  </script>
</body>
</html>
